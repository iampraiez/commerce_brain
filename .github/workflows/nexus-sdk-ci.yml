name: Nexus SDK CI

on:
  push:
    paths:
      - 'nexus-sdk/**'
    branches: [ main, master ]
  pull_request:
    paths:
      - 'nexus-sdk/**'
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'nexus-sdk/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build
